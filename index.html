<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cici's personal website-常征的个人网站</title>
    <style>
        body {
            margin: 0;
            padding: 0;
        }

        nav {
            background-color: #333;
            color: #fff;
            height: 60px;
            line-height: 60px;
            padding: 0 15px;
        }

        .wrapper {
            margin-left: 250px; /* 为侧栏预留空间 */
        }

        .sidebar {
            position: fixed;
            top: 60px; /* 如果 nav 高度为 60px */
            left: 0;
            width: 250px;
            height: calc(100% - 60px);
            background: #f4f4f4;
            padding: 20px;
        }

        .content {
            padding: 20px;
        }

    </style>
</head>

<body>
    <!-- 导航栏不受 margin 影响 -->
    <nav>
        <a href="#">首页</a>
        <a href="#">关于</a>
        <a href="#">联系</a>
    </nav>

    <!-- 带有侧栏和内容的容器 -->
    <div class="wrapper">
        <aside class="sidebar">
        <!-- 侧栏内容 -->
        个人信息
    </aside>
    <section class="content">
      <!-- 主体内容 -->
      这里是主要内容区域。
    </section>
  </div>
</body>

</html>
